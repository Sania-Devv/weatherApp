<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="font-nunito bg-gray-100">

  <div class="dashboard flex h-screen">

    <!-- LEFT SIDEBAR CONTAINER -->
    <aside id="sidebar" class="w-1/5 bg-gray-900 text-white p-4"></aside>

    <!-- MAIN CONTAINER -->
    <main id="main" class="w-3/5 p-4"></main>

    <!-- RIGHT CONTAINER (SEARCH + WEATHER) -->
    <aside id="right" class="w-1/5 bg-white p-4 shadow-lg"></aside>

  </div>
   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
