<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherApp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>

  <body class="min-h-screen flex items-center justify-center bg-slate-100">
    <div
      class="w-full max-w-7xl flex bg-white rounded-3xl overflow-hidden shadow-lg"
    >
      <!-- SIDEBAR -->
      <aside
        class="w-20 bg-slate-50 flex flex-col items-center justify-between py-6"
      >
        <div class="flex flex-col gap-6">
          <button class="text-blue-500 text-2xl">
            <i class="ri-dashboard-line"></i>
          </button>

          <button class="text-slate-500 text-xl hover:text-blue-500">
            <i class="ri-map-pin-line"></i>
          </button>

          <button class="text-slate-500 text-xl hover:text-blue-500">
            <i class="ri-bar-chart-line"></i>
          </button>

          <button class="text-slate-500 text-xl hover:text-blue-500">
            <i class="ri-calendar-line"></i>
          </button>
        </div>

        <button class="text-slate-500 text-xl hover:text-blue-500">
          <i class="ri-settings-3-line"></i>
        </button>
      </aside>

      <!-- MAIN -->
      <main class="flex-1 p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- CENTER -->
        <section class="lg:col-span-2 flex flex-col gap-6">
          <!-- HEADER -->
          <div class="flex justify-between items-start">
            <!-- LEFT SIDE: TIME + TEXT -->
            <div>
              <h1 id="timeDisplay" class="text-3xl font-bold">07:32 AM</h1>
              <p class="text-sm text-gray-400">Wednesday, 14 April</p>
              <h2 class="mt-2 text-lg">☀️ Good Morning</h2>
            </div>

            <!-- RIGHT SIDE: TOGGLE BUTTON -->
            <button
              id="themeToggle"
              class="w-10 h-10 rounded-xl bg-slate-200 flex items-center justify-center text-xl shadow-sm hover:scale-95 transition"
            >
              <i id="themeIcon" class="ri-moon-line"></i>
            </button>
          </div>

          <!-- FORECAST -->
          <div class="grid grid-cols-5 gap-3">
            <div class="p-3 bg-slate-100 rounded-xl text-center">
              <i class="ri-thunderstorms-line"></i>
              <p>28°</p>
            </div>

            <div class="p-3 bg-slate-100 rounded-xl text-center">
              <i class="ri-rainy-line"></i>
              <p>22°</p>
            </div>

            <div class="p-3 bg-blue-500 text-white rounded-xl text-center">
              <i class="ri-sun-line"></i>
              <p>30°</p>
            </div>

            <div class="p-3 bg-slate-100 rounded-xl text-center">
              <i class="ri-cloud-line"></i>
              <p>25°</p>
            </div>

            <div class="p-3 bg-slate-100 rounded-xl text-center">
              <i class="ri-windy-line"></i>
              <p>20°</p>
            </div>
          </div>

          <!-- INFO BOXES -->
          <div class="grid md:grid-cols-2 gap-4">
            <div class="p-4 bg-slate-50 rounded-xl">
              <h3>Air Quality</h3>
              <p>Good</p>
            </div>

            <div class="p-4 bg-slate-50 rounded-xl">
              <h3>Rainfall</h3>
              <p>Monthly Data</p>
            </div>
          </div>

          <!-- CHART -->
          <div class="p-4 bg-slate-50 rounded-xl">
            <canvas id="tempChart"></canvas>
          </div>
        </section>

        <!-- RIGHT PANEL -->
        <!-- RIGHT PANEL -->
        <section class="flex flex-col gap-6">
          <!-- TOP: SEARCH (NEW PLACE) -->
          <div class="flex gap-2">
            <input
              id="searchInput"
              type="text"
              placeholder="Search city..."
              class="w-full p-2 rounded-lg border"
            />

            <button
              id="searchBtn"
              class="bg-blue-500 text-white px-3 rounded-lg"
            >
              <i class="ri-search-line"></i>
            </button>

            <button id="locationBtn" class="bg-slate-200 px-3 rounded-lg">
              <i class="ri-map-pin-user-line"></i>
            </button>
          </div>

          <!-- CURRENT WEATHER CARD -->
          <div class="bg-blue-500 text-white p-5 rounded-2xl">
            <h2 id="cityName">City</h2>

            <h1 id="temperature" class="text-4xl font-bold">--°</h1>

            <p id="condition">Sunny</p>

            <div class="mt-4 text-sm">
              <p> Wind: <span id="wind"></span></p>
              <p> Humidity: <span id="humidity"></span></p>
            </div>
          </div>

          <!-- SAVED CITIES -->
          <div class="p-4 bg-slate-50 rounded-xl">
            <h3 class="text-sm font-bold">Saved Cities</h3>
            <div id="favoritesContainer"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
  </body>
</html>
